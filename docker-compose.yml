# docker-compose.yml
version: '3.8'

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: kuyen-backend
    restart: unless-stopped
    ports:
      - "8091:8090" # Changed to 8091 to avoid conflict with WsToastNotification.exe on host
    volumes:
      - pocketbase_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kuyen-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - POCKETBASE_URL=http://pocketbase:8090
    depends_on:
      - pocketbase
    # ARM64 specific optimization
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  pocketbase_data:

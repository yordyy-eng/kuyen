# docker-compose.yml
version: '3.8'

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: kuyen-backend
    restart: unless-stopped
    command: serve --http="0.0.0.0:8090" --dir="/usr/local/bin/pb_data"
    ports:
      - "8091:8090"
    volumes:
      - ./pb_data:/usr/local/bin/pb_data # Bind mount local correcto para esta imagen
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kuyen-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - POCKETBASE_URL=http://pocketbase:8090
    depends_on:
      - pocketbase
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  # El volumen nombrado se mantiene por compatibilidad si se desea, 
  # pero el servicio ahora usa el bind mount ./pb_data
  pocketbase_data:

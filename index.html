<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuyen | Premium Lunar Platform</title>
    <meta name="description" content="Kuyen: A next-generation lunar-themed platform built for high-end digital experiences.">
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header class="navbar glass">
        <div class="logo">KUYEN</div>
        <nav>
          <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#features">Features</a></li>
            <li><a href="#mission">Mission</a></li>
          </ul>
        </nav>
      </header>

      <main>
        <section class="hero">
          <div class="hero-content">
            <h1 class="fade-in">Embrace the <span class="glow">Lunar</span> Future</h1>
            <p class="fade-in-delayed">Elevating digital ecosystems through sophisticated design and seamless integration.</p>
            <div class="cta-group fade-in-delayed">
              <button class="btn primary">Explore Project</button>
              <button class="btn secondary">Documentation</button>
            </div>
          </div>
          <div class="hero-visual">
            <div class="moon-container">
              <img src="/kuyen_hero.png" alt="Kuyen Hero Illustration" class="moon-image">
              <div class="moon-orbit"></div>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer glass">
        <p>&copy; 2026 Kuyen. All rights reserved.</p>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
